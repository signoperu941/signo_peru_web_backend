version: '3.8'

services:
  # 1. Base de Datos
  postgres:
    image: postgres:15-alpine
    container_name: db-postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432" # Para conexion con DBeaver
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Almacenamiento de Videos
  minio:
    image: minio/minio
    container_name: storage-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    ports:
      - "9000:9000" # API para el backend
      - "9001:9001" # Consola web
    volumes:
      - minio_data:/data

  # 3. Backend
  signoperu-api:
    build: .
    container_name: backend-ia
    ports:
      - "80:8000"
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
      - minio
    environment:
      - CUDA_VISIBLE_DEVICES="-1"
      - TF_CPP_MIN_LOG_LEVEL="2"

  # 4. Túnel de Cloudflare
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tunnel-cloudflare
    command: tunnel --no-autoupdate --protocol http2 run --token ${CF_TUNNEL_TOKEN}
    restart: always
    depends_on:
      - signoperu-api

# Declaración de volúmenes persistentes para no perder datos al reiniciar
volumes:
  postgres_data:
  minio_data: