version: '3.8'

services:
  # 1. Base de Datos On-Premise
  postgres:
    image: postgres:15-alpine
    container_name: db-postgres
    restart: always
    # Lee las variables del archivo .env automáticamente
    env_file:
      - .env
    ports:
      - "5432:5432" # Expuesto para que te conectes con DBeaver
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Almacenamiento de Videos On-Premise
  minio:
    image: minio/minio
    container_name: storage-minio
    restart: always
    command: server /data --console-address ":9001"
    # Inyecta las variables del .env para crear el usuario root
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    ports:
      - "9000:9000" # API para el backend
      - "9001:9001" # Consola web de administración
    volumes:
      - minio_data:/data

  # 3. Tu Backend
  signoperu-api:
    build: .
    container_name: backend-ia
    ports:
      - "8000:8000"
    restart: always
    env_file:
      - .env # Asegura que el backend tenga acceso a las variables
    depends_on:
      - postgres
      - minio

  # 4. Túnel de Cloudflare
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tunnel-cloudflare
    # Tu comando con el protocolo http2 para saltar el firewall
    command: tunnel --no-autoupdate run --token 
    restart: always
    depends_on:
      - signoperu-api

# Declaración de volúmenes persistentes para no perder datos al reiniciar
volumes:
  postgres_data:
  minio_data: